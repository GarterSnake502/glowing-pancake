<!DOCTYPE html>
<html>
<head>
    <title>Walkback AR Test</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script type='text/javascript' src='https://raw.githack.com/AR-js-org/AR.js/3.4.7/three.js/build/ar-threex-location-only.js'></script>
    <script type='text/javascript' src='https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js'></script>
</head>

<body>
    <a-scene vr-mode-ui='enabled: false' arjs='sourceType: webcam; videoTexture: true; debugUIEnabled: false' renderer='antialias: true; alpha: true'>
        <a-camera id="cam" gps-new-camera='gpsMinDistance: 5' rotation-reader></a-camera>
    </a-scene>

    <div id="distanceLabel" style="position: fixed; top:20px; z-index: 999; color: red; font-size: 20px;">
        Distance: 0m
    </div>
    <div id="arrowLabel" style="position: fixed; top:80%; left:50%; z-index: 999; color: red; font-size: 60px;">
        ↑
    </div>
</body>
</html>

<script>

    const target = { lat: 39.8519, lon: -86.3945, elev: 0, color: "green" }

    // update distance every 500 milliseconds
    const updateARDistanceLabelInterval = setInterval(() => {
        var pos = getPos();
        updateARDistanceLabel(getARDistance(pos.lat, pos.lon, target.lat, target.lon));
    }, 500);
    // update arrow every 250 milliseconds
    const updateARArrowLabelInterval = setInterval(() => {
        var pos = getPos();
        var objectAngle = Math.atan2(target.lon - pos.lon, target.lat - pos.lat) * (180 / Math.PI);
        var deviceAngle = document.querySelector('a-camera').getAttribute('rotation').y;
        var arrowAngle = objectAngle - deviceAngle;

        ee("arrowLabel").style.transform = `rotate(${arrowAngle}deg)`
    }, 250);

    function cancelLabelUpdates() {
        clearInterval(updateARDistanceLabelInterval);
        clearInterval(updateARArrowLabelInterval);
    }

    function createARPoint(lat, lon, elev, col = "red", relativeElevation = false) {
        var newObjects = `<a-entity material=\'color: ${col}\' geometry=\'primitive: box\' ${(relativeElevation) ? "gps-new-entity-place" : "gps-entity-place"}="latitude: ${lat}; longitude: ${lon}" position="0 ${elev} 0" scale="10 10 10"></a-entity>`;
        const scene = document.querySelector('a-scene');
        scene.insertAdjacentHTML('beforeend', newObjects);
    }

    function getARDistance(lat, lon, plat, plon) {
        var dist = Math.sqrt((plat - lat) ** 2 + (plon - lon) ** 2);
        return dist;
    }

    function updateARDistanceLabel(dist) {
        ee("distanceLabel").innerText = "Distance: " + dist;
    }

    // function already possessed by DiamondMaps, delete when merged
    function ee(id) {
        return document.getElementById(id);
    }
    // function already possessed by DiamondMaps, replace with builtin GPS
    function getPos() {
        var latitude = 0;
        var longitude = 0;
        navigator.geolocation.watchPosition(pos => {
            latitude = pos.coords.latitude;
            longitude = pos.coords.longitude;
        });
        if (latitude == null) { // cannot access GPS
            ee("distanceLabel").innerText = "GPS Unavailable!";
        }
        return { lat: latitude, lon: longitude };
    }


    // test-show rotation on touchscreen click
    document.addEventListener('click', function () {
        const rotation = document.querySelector('a-camera').getAttribute('rotation');
        const message = `Camera rotation: x=${rotation.x}, y=${rotation.y}, z=${rotation.z}`;
        alert(message);
    });

    // create sample AR point (will be replaced by manhole)
    createARPoint(target.lat, target.lon, target.elev, "green");
</script>
