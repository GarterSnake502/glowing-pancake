<!DOCTYPE html>
<html>
<head>
    <title>Walkback AR Test</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script type='text/javascript' src='https://raw.githack.com/AR-js-org/AR.js/3.4.7/three.js/build/ar-threex-location-only.js'></script>
    <script type='text/javascript' src='https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js'></script>
</head>

<body>
    <a-scene vr-mode-ui='enabled: false' arjs='sourceType: webcam; videoTexture: true; debugUIEnabled: false' renderer='antialias: true; alpha: true'>
        <a-camera id="cam" gps-new-camera='gpsMinDistance: 5' rotation-reader></a-camera>
    </a-scene>

    <div id="distanceLabel" style="position: fixed; top:20px; z-index: 999; color: red; font-size: 20px;">
        Distance: 0m
    </div>
    <div id="logLabel" style="position: fixed; top:40px; z-index: 999; color: red; font-size: 20px;">
        Log
    </div>
    <div id="arrowLabel" style="position: fixed; top:80%; left:50%; z-index: 999; color: red; font-size: 60px;">
        ↑
    </div>
</body>
</html>

<script>

    const target = { lat: 39.85208, lon: -86.39334, elev: 0, color: "green" }
    var g_gps = {
        lat: 0, lon: 0
    };

    // fetch phone GPS--will want to switch to g_gps in final
    navigator.geolocation.watchPosition(pos => {
        g_gps = {
            lat: pos.coords.latitude,
            lon: pos.coords.longitude
        };
        updateARArrowLabel();
        updateARDistanceLabel();
        ee("logLabel").insertAdjacentText('beforeend', ("Updated position: " + g_gps.lat + "  " + g_gps.lon));
    }, err => {
        ee("distanceLabel").innerText = "GPS Unavailable!";
    });

    //// update distance every 500 milliseconds
    //const updateARDistanceLabelInterval = setInterval(() => {
    //    updateARDistanceLabel();
    //}, 500);
    //// update arrow every 250 milliseconds
    const updateARArrowLabelInterval = setInterval(() => {
        updateARArrowLabel();
    }, 250);

    function cancelLabelUpdates() {
        clearInterval(updateARDistanceLabelInterval);
        clearInterval(updateARArrowLabelInterval);
    }

    function createARPoint(lat, lon, elev, col = "red", relativeElevation = true) {
        var newObject = `<a-entity material=\'color: ${col}\' geometry=\'primitive: box\' ${(relativeElevation) ? "gps-new-entity-place" : "gps-entity-place"}="latitude: ${lat}; longitude: ${lon}" position="0 ${elev} 0" scale="10 10 10"></a-entity>`;
        console.log(newObject);
        const scene = document.querySelector('a-scene');
        scene.insertAdjacentHTML('beforeend', newObject);
    }

    function getARDistance(lat, lon, plat, plon) {
        var dist = Math.sqrt((plat - lat) ** 2 + (plon - lon) ** 2);
        return (dist * 111139); // multiple by 111139 to convert lat/lon to degrees
    }

    function updateARDistanceLabel() {
        var pos = g_gps;
        ee("distanceLabel").innerText = "Distance: " + (getARDistance(pos.lat, pos.lon, target.lat, target.lon));
    }
    // get actual north, so arrow is accurate
    var northOrientation = 0;
 
    //window.addEventListener('deviceorientationabsolute', e => {
    //    northOrientation = e.alpha;
    //})

    function updateARArrowLabel() {
        var pos = g_gps;
        var objectAngle = getBearing(pos.lat, pos.lon, target.lat, target.lon);
        var cameraAngle = document.querySelector('a-camera').getAttribute('rotation').y;
        var arrowAngle = cameraAngle - objectAngle;

        ee("arrowLabel").style.transform = `rotate(${arrowAngle}deg)`
    }

    // Converts from degrees to radians.
    function toRadians(degrees) {
        return degrees * Math.PI / 180;
    };

    // Converts from radians to degrees.
    function toDegrees(radians) {
        return radians * 180 / Math.PI;
    }

    function getBearing(lat, lng, tlat, tlon) {
        lat = toRadians(lat);
        lng = toRadians(lng);
        tlat = toRadians(tlat);
        tlon = toRadians(tlon);

        var y = Math.sin(tlon - lng) * Math.cos(tlat);
        var x = Math.cos(lat) * Math.sin(tlat) -
            Math.sin(lat) * Math.cos(tlat) * Math.cos(tlon - lng);
        var brng = Math.atan2(y, x);
        brng = toDegrees(brng);
        return (brng + 360) % 360;
    }

    // function already possessed by DiamondMaps, delete when merged
    function ee(id) {
        return document.getElementById(id);
    }
   

    // create sample AR point (will be replaced by manhole)
    createARPoint(target.lat, target.lon, target.elev, "green");
</script>
