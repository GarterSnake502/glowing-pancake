<!DOCTYPE html>
<html>
<head>
    <title>AR.js A-Frame Location-based</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script type='text/javascript' src='https://raw.githack.com/AR-js-org/AR.js/3.4.7/three.js/build/ar-threex-location-only.js'></script>
    <script type='text/javascript' src='https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js'></script>
</head>
<body>
    <a-scene vr-mode-ui='enabled: false' arjs='sourceType: webcam; videoTexture: true; debugUIEnabled: false' renderer='antialias: true; alpha: true'>
        <a-camera gps-new-camera='gpsMinDistance: 5'></a-camera>
        <a-entity material='color: red' geometry='primitive: box' gps-new-entity-place="latitude: 39.851938773575384; longitude: -86.39454408338582" scale="10 10 10"></a-entity>
    </a-scene>
</body>
</html>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const pts = [
            { lat: 39.8519, lon: -86.3945 },
            { lat: 40.0, lon: -86.3946 }
        ];

        const scene = document.querySelector("a-scene");

        pts.forEach(p => {
            const el = document.createElement("a-entity");

            el.setAttribute("geometry", "primitive: circle; radius: 2");
            el.setAttribute("material", "color: red");

            // Place at GPS coords
            el.setAttribute("gps-new-entity-place", `latitude: ${p.lat}; longitude: ${p.lon}`);

            // Rotate so it's flat on the ground (at your feet)
            el.setAttribute("rotation", "-90 0 0");

            scene.appendChild(el);
        });
    });
</script>
